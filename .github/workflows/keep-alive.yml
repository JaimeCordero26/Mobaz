name: Keep Supabase alive

# Supabase pausa proyectos free tier tras ~7 días sin actividad.
# Este workflow hace una consulta liviana cada 3 días para mantenerlo despierto.

on:
  schedule:
    - cron: "0 12 */3 * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Query Supabase REST API
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Faltan los secrets SUPABASE_URL / SUPABASE_ANON_KEY en el repo." >&2
            exit 1
          fi
          curl -sf "$SUPABASE_URL/rest/v1/admin_settings?select=id&limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
